name: bigdata

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: bigdata-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5431:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data:/mock_data:ro
    networks:
      - bigdata-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: bigdata-clickhouse
    environment:
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    healthcheck:
      test: [ "CMD", "clickhouse-client", "--user", "clickhouse", "--password", "clickhouse", "--query", "SELECT 1" ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - bigdata-network

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigdata-spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./data:/mock_data:ro
    networks:
      - bigdata-network

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigdata-spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./data:/mock_data:ro
    networks:
      - bigdata-network

  etl-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigdata-etl-runner
    environment:
      - SPARK_MODE=etl
      - SPARK_MASTER_URL=spark://spark-master:7077
    depends_on:
      postgres-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    volumes:
      - ./spark-apps:/opt/spark-apps
      - ./data:/mock_data:ro
    networks:
      - bigdata-network
    profiles:
      - run-etl
    restart: "no"

volumes:
  postgres-data:
  clickhouse-data:

networks:
  bigdata-network:
    driver: bridge